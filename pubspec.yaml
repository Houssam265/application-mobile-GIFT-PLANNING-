name: giftplan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # ── Backend Supabase ──────────────────────────────
  supabase_flutter: ^2.3.0
  jwt_decode: ^0.3.1

  # ── Navigation ───────────────────────────────────
  go_router: ^13.0.0

  # ── State Management ─────────────────────────────
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # ── Notifications Push ────────────────────────────
  onesignal_flutter: ^5.1.0

  # ── Images ───────────────────────────────────────
  cached_network_image: ^3.3.0
  flutter_image_compress: ^2.1.0

  # ── OAuth Social Login ────────────────────────────

  # ── Sélection d'images (photo couverture listes) ──
  image_picker: ^1.0.7
  share_plus: ^12.0.1
  qr_flutter: ^4.1.0
  app_links: ^6.4.1
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ── Riverpod Code Generation ──────────────────────
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/logo_text.png
    - assets/images/giftplan_app_icon.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/giftplan_app_icon.png"
  min_sdk_android: 21